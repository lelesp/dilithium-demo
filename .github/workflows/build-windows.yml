name: Build Windows Executable

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone vcpkg
        run: |
          if (Test-Path C:/vcpkg) { Remove-Item -Recurse -Force C:/vcpkg }
          git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg

      - name: Bootstrap vcpkg
        working-directory: C:/vcpkg
        run: |
          git pull origin master
          bootstrap-vcpkg.bat -disableMetrics

      - name: Install dependencies
        run: |
          C:/vcpkg/vcpkg.exe install liboqs:x64-windows qtbase:x64-windows qtdeclarative:x64-windows libzip:x64-windows

      - name: Configure CMake
        shell: bash
        run: |
          mkdir -p build
          cd build
          cmake ../client \
            -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Deploy Qt
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item build/Release/DilithiumClient.exe dist/
          & "C:/vcpkg/installed/x64-windows/tools/qtbase/bin/windeployqt.exe" dist/DilithiumClient.exe --no-translations 2>&1 || true
          Compress-Archive -Path dist/* -DestinationPath DilithiumClient-Windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DilithiumClient-Windows
          path: DilithiumClient-Windows.zip
