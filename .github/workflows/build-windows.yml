name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install vcpkg
        uses: notrynohigh/vcpkg-action@v1.1.4
        with:
          vcpkg-git-ref: 2024.11.12

      - name: Install dependencies
        run: |
          vcpkg install liboqs:x64-windows-static qt6-base:x64-windows-static libzip:x64-windows-static

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Show build output
        run: |
          ls -la build/Release/

      - name: Deploy Qt
        run: |
          & "$env:VCPKG_ROOT/installed/x64-windows-static/tools/qt6/bin/windeployqt.exe" build/Release/DilithiumClient.exe

      - name: Create archive
        run: |
          $date = Get-Date -Format "yyyyMMdd"
          Compress-Archive -Path "build/Release/*" -DestinationPath "DilithiumClient-$date.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DilithiumClient-Windows
          path: DilithiumClient-*.zip
